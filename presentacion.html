<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Los servicios basados en datos y la construcción de ecosistemas científicos</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/simple.css">
  <link rel="stylesheet" href="tema-dialnet2.css">
</head>

<body>
<div class="reveal">
  <div class="slides">
    <section data-markdown="slides.md"
             data-separator="^---$"
             data-separator-notes="^Note:"
             data-charset="utf-8">
    </section>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/markdown/markdown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/notes/notes.js"></script>
<script>
  Reveal.initialize({
    hash: true,
    slideNumber: 'c/t',
    progress: true,
    controls: true,
    transition: 'slide',
    center: true,
    width: 1280,
    height: 720,
    margin: 0.08,
    pdfSeparateFragments: false,
    pdfMaxPagesPerSlide: 1,
    plugins: [ RevealMarkdown, RevealNotes ]
  });
</script>
</body>
</html>
