<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a4d8f"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a085"/>
    </marker>
    <marker id="arr-g-rev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#16a085"/>
    </marker>
  </defs>

  <!-- Fuentes (F1, F2, F3) -->
  <rect x="30" y="60" width="100" height="56" rx="6" fill="#e8f0fa" stroke="#1a4d8f" stroke-width="2"/>
  <text x="80" y="94" text-anchor="middle" font-size="18" font-weight="600" fill="#1a4d8f">F1</text>

  <rect x="30" y="182" width="100" height="56" rx="6" fill="#e8f0fa" stroke="#1a4d8f" stroke-width="2"/>
  <text x="80" y="216" text-anchor="middle" font-size="18" font-weight="600" fill="#1a4d8f">F2</text>

  <rect x="30" y="304" width="100" height="56" rx="6" fill="#e8f0fa" stroke="#1a4d8f" stroke-width="2"/>
  <text x="80" y="338" text-anchor="middle" font-size="18" font-weight="600" fill="#1a4d8f">F3</text>

  <text x="80" y="396" text-anchor="middle" font-size="13" fill="#888" font-style="italic">Fuentes</text>

  <!-- Flechas F → Dataset -->
  <line x1="130" y1="88" x2="278" y2="192" stroke="#1a4d8f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="130" y1="210" x2="278" y2="210" stroke="#1a4d8f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="130" y1="332" x2="278" y2="228" stroke="#1a4d8f" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Dataset (óvalo central) -->
  <ellipse cx="380" cy="210" rx="102" ry="62" fill="#d5f5ef" stroke="#16a085" stroke-width="2.5"/>
  <text x="380" y="217" text-anchor="middle" font-size="22" font-weight="700" fill="#0e6655">Dataset</text>

  <!-- Nodo: Enriquecimiento IA (círculo arriba-derecha) -->
  <circle cx="600" cy="105" r="52" fill="#fef9e7" stroke="#16a085" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#0e6655">Enriquecimiento</text>
  <text x="600" y="117" text-anchor="middle" font-size="13" font-weight="600" fill="#0e6655">IA</text>

  <!-- Flecha Dataset → Enriquecimiento (ida) -->
  <line x1="462" y1="168" x2="560" y2="130" stroke="#16a085" stroke-width="2" marker-end="url(#arr-g)"/>
  <!-- Flecha Enriquecimiento → Dataset (vuelta, punteada) -->
  <line x1="555" y1="143" x2="467" y2="178" stroke="#16a085" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr-g)"/>

  <!-- Nodo: Curación (círculo abajo-derecha) -->
  <circle cx="600" cy="315" r="52" fill="#fef9e7" stroke="#16a085" stroke-width="2"/>
  <text x="600" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#0e6655">Curación</text>

  <!-- Flecha Dataset → Curación (ida) -->
  <line x1="462" y1="252" x2="560" y2="290" stroke="#16a085" stroke-width="2" marker-end="url(#arr-g)"/>
  <!-- Flecha Curación → Dataset (vuelta, punteada) -->
  <line x1="555" y1="277" x2="467" y2="242" stroke="#16a085" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr-g)"/>

  <!-- Flecha salida → Servicios -->
  <line x1="660" y1="210" x2="840" y2="210" stroke="#1a4d8f" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="845" y="190" width="105" height="40" rx="6" fill="#e8f0fa" stroke="#1a4d8f" stroke-width="2"/>
  <text x="897" y="216" text-anchor="middle" font-size="17" font-weight="700" fill="#1a4d8f">Servicios</text>
</svg>
